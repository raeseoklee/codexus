name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Check formatting whitespace
        run: git diff --check

      - name: Static syntax check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
