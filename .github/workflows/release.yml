name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Publish mode"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Trusted npm publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"
          case "${version}" in
            *-*) echo "Prerelease tags must publish via workflow_dispatch mode=next, not tag publish"; exit 1 ;;
          esac

      - name: Release check
        run: npm run release:check

      - name: Publish stable from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run publish:stable -- --no-dist-tag-sync

      - name: Publish stable from workflow dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && !inputs.dry_run
        run: npm run publish:stable -- --no-dist-tag-sync

      - name: Publish next from workflow dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'next' && !inputs.dry_run
        run: npm run publish:next -- --no-dist-tag-sync

      - name: Dry-run stable publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && inputs.dry_run
        run: npm run publish:stable -- --dry-run

      - name: Dry-run next publish
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'next' && inputs.dry_run
        run: npm run publish:next -- --dry-run

      - name: Verify dist-tags
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm view codexus dist-tags --json --prefer-online

  github-release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create or refresh GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="docs/release-evidence/${version}.md"
          notes_args=(--generate-notes)
          if [ -f "$notes_file" ]; then
            notes_args=(--notes-file "$notes_file")
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Codexus ${GITHUB_REF_NAME}" \
              --latest \
              "${notes_args[@]}"
            gh release upload "$GITHUB_REF_NAME" install.sh --clobber
          else
            gh release create "$GITHUB_REF_NAME" install.sh \
              --verify-tag \
              --latest \
              --title "Codexus ${GITHUB_REF_NAME}" \
              "${notes_args[@]}"
          fi
